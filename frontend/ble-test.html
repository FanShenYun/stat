<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLE 印表機測試</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --text: #e0e0e0;
    --text-muted: #888;
    --accent: #3498db;
    --green: #2ecc71;
    --red: #e74c3c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    padding: 16px;
  }
  .container {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  h1 { font-size: 20px; text-align: center; padding: 12px 0; }
  .card {
    background: var(--surface);
    border-radius: 10px;
    padding: 16px;
  }
  .card h2 { font-size: 15px; color: var(--accent); margin-bottom: 10px; }
  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-green { background: var(--green); color: #fff; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .status {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .status.connected { color: var(--green); }
  .status.error { color: var(--red); }
  .log {
    background: #0d1117;
    border-radius: 8px;
    padding: 12px;
    font-family: monospace;
    font-size: 12px;
    line-height: 1.5;
    max-height: 300px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .log .ok { color: var(--green); }
  .log .err { color: var(--red); }
  .log .info { color: var(--accent); }
  input[type="text"] {
    width: 100%;
    padding: 10px;
    border: 1px solid #ffffff20;
    border-radius: 8px;
    background: #0d1117;
    color: var(--text);
    font-size: 14px;
    margin-bottom: 10px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>BLE 印表機測試</h1>

  <!-- Step 1: Connect -->
  <div class="card">
    <h2>Step 1 — 連線 QIU-C15</h2>
    <div style="display:flex;gap:8px;margin-bottom:8px;">
      <button class="btn btn-primary" style="flex:1" onclick="connectPrinter('name')">以名稱搜尋 QIU</button>
      <button class="btn btn-primary" style="flex:1;background:#8e44ad;" onclick="connectPrinter('all')">顯示所有裝置</button>
    </div>
    <div class="status" id="statusConnect" style="margin-top:10px;"></div>
  </div>

  <!-- Step 2: Protocol test -->
  <div class="card">
    <h2>Step 2 — 測試列印（選擇協議）</h2>
    <input type="text" id="inputText" value="Hello" placeholder="輸入測試文字">
    <div style="display:flex;flex-direction:column;gap:8px;">
      <button class="btn btn-green test-btn" onclick="sendTSPL()" disabled>TSPL（標籤印表機常用）</button>
      <button class="btn btn-green test-btn" onclick="sendCPCL()" disabled>CPCL（另一種標籤協議）</button>
      <button class="btn btn-green test-btn" onclick="sendESCPOS()" disabled>ESC/POS（收據印表機）</button>
      <button class="btn test-btn" style="background:#e67e22;color:#fff;" onclick="queryStatus()" disabled>查詢印表機狀態</button>
    </div>
    <div class="status" id="statusSend" style="margin-top:10px;"></div>
  </div>

  <!-- Step 3: Label settings -->
  <div class="card">
    <h2>標籤設定（TSPL/CPCL 用）</h2>
    <div style="display:flex;gap:8px;margin-bottom:8px;">
      <div style="flex:1">
        <label style="font-size:12px;color:var(--text-muted);">寬度 mm</label>
        <input type="text" id="labelWidth" value="40" style="margin-bottom:0;">
      </div>
      <div style="flex:1">
        <label style="font-size:12px;color:var(--text-muted);">高度 mm</label>
        <input type="text" id="labelHeight" value="30" style="margin-bottom:0;">
      </div>
      <div style="flex:1">
        <label style="font-size:12px;color:var(--text-muted);">間距 mm</label>
        <input type="text" id="labelGap" value="2" style="margin-bottom:0;">
      </div>
    </div>
    <div style="display:flex;gap:8px;">
      <label style="font-size:13px;display:flex;align-items:center;gap:4px;">
        <input type="radio" name="orientation" value="0" checked> 直向
      </label>
      <label style="font-size:13px;display:flex;align-items:center;gap:4px;">
        <input type="radio" name="orientation" value="1"> 橫向
      </label>
    </div>
  </div>

  <!-- Log -->
  <div class="card">
    <h2>Log</h2>
    <div class="log" id="logArea"></div>
  </div>
</div>

<script>
// ── BLE UUIDs (from nRF Connect scan) ──
const PRINTER_SERVICE_UUID    = 0xAE30;
const PRINTER_WRITE_CHAR_UUID = 0xAE01;
const PRINTER_NOTIFY_CHAR_UUID = 0xAE02;

let bleDevice = null;
let bleServer = null;
let writeChar = null;
let notifyChar = null;

const logArea = document.getElementById('logArea');

function log(msg, type = '') {
  const span = document.createElement('span');
  span.className = type;
  span.textContent = `[${new Date().toLocaleTimeString()}] ${msg}\n`;
  logArea.appendChild(span);
  logArea.scrollTop = logArea.scrollHeight;
}

function setStatus(id, text, cls = '') {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'status' + (cls ? ' ' + cls : '');
}

// ── Step 1: Connect ──
async function connectPrinter(mode = 'all') {
  try {
    log(`正在搜尋 BLE 裝置 (模式: ${mode})...`, 'info');
    setStatus('statusConnect', '搜尋中...');

    let requestOptions;
    if (mode === 'name') {
      // 用名稱前綴過濾，同時把 printer service 放在 optionalServices
      requestOptions = {
        filters: [{ namePrefix: 'QIU' }],
        optionalServices: [PRINTER_SERVICE_UUID]
      };
      log('使用 namePrefix "QIU" 過濾', 'info');
    } else {
      // 顯示所有 BLE 裝置，方便除錯
      requestOptions = {
        acceptAllDevices: true,
        optionalServices: [PRINTER_SERVICE_UUID]
      };
      log('顯示所有 BLE 裝置（acceptAllDevices）', 'info');
    }

    bleDevice = await navigator.bluetooth.requestDevice(requestOptions);

    log(`找到裝置: ${bleDevice.name || bleDevice.id}`, 'ok');

    // Listen for disconnect
    bleDevice.addEventListener('gattserverdisconnected', () => {
      log('裝置已斷線', 'err');
      setStatus('statusConnect', '已斷線', 'error');
      document.querySelectorAll('.test-btn').forEach(b => b.disabled = true);
      writeChar = null;
      notifyChar = null;
    });

    // Connect to GATT server
    log('正在連線 GATT Server...', 'info');
    bleServer = await bleDevice.gatt.connect();
    log('GATT Server 已連線', 'ok');

    // Get service
    log(`正在取得 Service 0x${PRINTER_SERVICE_UUID.toString(16).toUpperCase()}...`, 'info');
    const service = await bleServer.getPrimaryService(PRINTER_SERVICE_UUID);
    log('Service 取得成功', 'ok');

    // Get write characteristic
    log(`正在取得 Write Characteristic 0x${PRINTER_WRITE_CHAR_UUID.toString(16).toUpperCase()}...`, 'info');
    writeChar = await service.getCharacteristic(PRINTER_WRITE_CHAR_UUID);
    log(`Write Characteristic 取得成功 (properties: ${formatProperties(writeChar.properties)})`, 'ok');

    // Get notify characteristic
    try {
      notifyChar = await service.getCharacteristic(PRINTER_NOTIFY_CHAR_UUID);
      log(`Notify Characteristic 取得成功`, 'ok');

      await notifyChar.startNotifications();
      notifyChar.addEventListener('characteristicvaluechanged', (event) => {
        const value = event.target.value;
        const bytes = new Uint8Array(value.buffer);
        const hex = Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join(' ');
        log(`印表機回應: [${hex}]`, 'info');
      });
      log('已啟用 Notify 監聽', 'ok');
    } catch (e) {
      log(`Notify 設定失敗 (非致命): ${e.message}`, 'err');
    }

    setStatus('statusConnect', `已連線: ${bleDevice.name || bleDevice.id}`, 'connected');
    document.querySelectorAll('.test-btn').forEach(b => b.disabled = false);
    log('連線完成，可以開始測試列印', 'ok');

  } catch (e) {
    log(`連線失敗: ${e.message}`, 'err');
    setStatus('statusConnect', `連線失敗: ${e.message}`, 'error');
  }
}

// ── BLE Send Helper ──
async function bleSend(payload, label) {
  if (!writeChar) {
    log('尚未連線', 'err');
    return false;
  }
  try {
    log(`[${label}] 送出 ${payload.length} bytes...`, 'info');
    log(`Hex: ${Array.from(payload).map(b => b.toString(16).padStart(2, '0')).join(' ')}`, 'info');
    log(`ASCII: ${new TextDecoder('ascii', {fatal: false}).decode(payload)}`, 'info');

    const MTU = 20;
    for (let i = 0; i < payload.length; i += MTU) {
      const chunk = payload.slice(i, i + MTU);
      await writeChar.writeValueWithoutResponse(chunk);
      // Small delay between chunks to avoid BLE congestion
      await new Promise(r => setTimeout(r, 20));
    }
    log(`[${label}] 送出完成`, 'ok');
    setStatus('statusSend', `${label} 送出成功`, 'connected');
    return true;
  } catch (e) {
    log(`[${label}] 送出失敗: ${e.message}`, 'err');
    setStatus('statusSend', `送出失敗: ${e.message}`, 'error');
    return false;
  }
}

function strToBytes(str) {
  return new TextEncoder().encode(str);
}

function getLabel() {
  return {
    width: document.getElementById('labelWidth').value || '40',
    height: document.getElementById('labelHeight').value || '30',
    gap: document.getElementById('labelGap').value || '2',
    orientation: document.querySelector('input[name="orientation"]:checked').value
  };
}

// ── TSPL Protocol ──
async function sendTSPL() {
  const text = document.getElementById('inputText').value || 'Test';
  const lb = getLabel();

  log('=== TSPL 測試 ===', 'info');

  // TSPL commands are ASCII text terminated with \r\n
  const cmd = [
    `SIZE ${lb.width} mm,${lb.height} mm`,
    `GAP ${lb.gap} mm,0`,
    `DIRECTION ${lb.orientation}`,
    `CLS`,
    `TEXT 10,10,"TSS24.BF2",0,1,1,"${text}"`,
    `PRINT 1,1`,
    ``
  ].join('\r\n');

  log(`TSPL 指令:\n${cmd}`, 'info');
  await bleSend(strToBytes(cmd), 'TSPL');
}

// ── CPCL Protocol ──
async function sendCPCL() {
  const text = document.getElementById('inputText').value || 'Test';
  const lb = getLabel();

  log('=== CPCL 測試 ===', 'info');

  // Convert mm to dots (203 DPI: 1mm ≈ 8 dots)
  const heightDots = Math.round(parseFloat(lb.height) * 8);

  const cmd = [
    `! 0 200 200 ${heightDots} 1`,
    lb.orientation === '1' ? 'PAGE-WIDTH 240' : '',
    `TEXT 4 0 10 10 ${text}`,
    `PRINT`,
    ``
  ].filter(Boolean).join('\r\n');

  log(`CPCL 指令:\n${cmd}`, 'info');
  await bleSend(strToBytes(cmd), 'CPCL');
}

// ── ESC/POS Protocol ──
async function sendESCPOS() {
  const text = document.getElementById('inputText').value || 'Test';

  log('=== ESC/POS 測試 ===', 'info');

  const ESC = 0x1B;
  const GS = 0x1D;
  const LF = 0x0A;

  const initCmd = new Uint8Array([ESC, 0x40]);                     // ESC @ — Initialize
  const textBytes = strToBytes(text + '\n');
  const feedCut = new Uint8Array([LF, LF, LF, GS, 0x56, 0x00]);   // Feed + Full cut

  const payload = new Uint8Array([...initCmd, ...textBytes, ...feedCut]);
  await bleSend(payload, 'ESC/POS');
}

// ── Query printer status ──
async function queryStatus() {
  log('=== 查詢印表機狀態 ===', 'info');

  // Try multiple status query methods
  // 1) ESC/POS: DLE EOT (real-time status)
  log('嘗試 ESC/POS DLE EOT 狀態查詢...', 'info');
  await bleSend(new Uint8Array([0x10, 0x04, 0x01]), 'DLE EOT');
  await new Promise(r => setTimeout(r, 500));

  // 2) TSPL: send empty line to see if printer echoes error
  log('嘗試 TSPL 空指令...', 'info');
  await bleSend(strToBytes('\r\n'), 'TSPL-ping');
  await new Promise(r => setTimeout(r, 500));

  // 3) Try reading a characteristic if available
  if (notifyChar) {
    log('Notify characteristic 已啟用，檢查上方是否有印表機回應', 'info');
  } else {
    log('Notify characteristic 未啟用，無法接收回應', 'err');
  }
}

// ── Helpers ──
function formatProperties(props) {
  const flags = [];
  if (props.read) flags.push('Read');
  if (props.write) flags.push('Write');
  if (props.writeWithoutResponse) flags.push('WriteNoResp');
  if (props.notify) flags.push('Notify');
  if (props.indicate) flags.push('Indicate');
  return flags.join(', ');
}
</script>
</body>
</html>
