<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>STAT - 檢傷標籤語音列印</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --text: #e0e0e0;
    --text-muted: #888;
    --red: #e74c3c;
    --yellow: #f1c40f;
    --green: #2ecc71;
    --black-tag: #2c2c2c;
    --gray: #7f8c8d;
    --accent: #3498db;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-user-select: none;
    user-select: none;
  }
  .container {
    width: 100%;
    max-width: 420px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }
  header {
    text-align: center;
    padding: 12px 0;
  }
  header h1 { font-size: 20px; letter-spacing: 2px; }
  header .subtitle { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: var(--surface);
    border-radius: 10px;
    margin: 10px 0;
    font-size: 14px;
  }
  .status-bar .printer-status { display: flex; align-items: center; gap: 6px; }
  .status-bar .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--gray);
    display: inline-block;
  }
  .status-bar .dot.connected { background: var(--green); }
  .status-bar .case-count { color: var(--text-muted); }

  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 16px;
  }

  /* Screens */
  .screen { display: none; width: 100%; text-align: center; }
  .screen.active { display: flex; flex-direction: column; align-items: center; gap: 16px; }

  /* Record button */
  .record-btn {
    width: 140px; height: 140px;
    border-radius: 50%;
    border: 4px solid var(--accent);
    background: transparent;
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  .record-btn .mic { font-size: 40px; }
  .record-btn:active, .record-btn.recording {
    background: rgba(231, 76, 60, 0.2);
    border-color: var(--red);
    transform: scale(1.05);
  }

  /* Recording indicator */
  .recording-info { font-size: 14px; color: var(--text-muted); }
  .recording-dot {
    display: inline-block;
    width: 12px; height: 12px;
    background: var(--red);
    border-radius: 50%;
    animation: pulse 1s infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Processing */
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid var(--surface);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Result card */
  .result-card {
    width: 100%;
    border-radius: 12px;
    padding: 20px;
    text-align: left;
  }
  .result-card.red { background: linear-gradient(135deg, #c0392b22, #e74c3c33); border: 2px solid var(--red); }
  .result-card.yellow { background: linear-gradient(135deg, #f39c1222, #f1c40f33); border: 2px solid var(--yellow); }
  .result-card.green { background: linear-gradient(135deg, #27ae6022, #2ecc7133); border: 2px solid var(--green); }
  .result-card.black { background: linear-gradient(135deg, #1a1a1a44, #2c2c2c66); border: 2px solid #555; }
  .result-card.unknown { background: linear-gradient(135deg, #7f8c8d22, #95a5a633); border: 2px solid var(--gray); }

  .result-level {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 8px;
  }
  .result-card.red .result-level { color: var(--red); }
  .result-card.yellow .result-level { color: var(--yellow); }
  .result-card.green .result-level { color: var(--green); }
  .result-card.black .result-level { color: #aaa; }
  .result-card.unknown .result-level { color: var(--gray); }

  .result-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
  .result-summary { font-size: 15px; line-height: 1.5; margin-bottom: 12px; }
  .result-actions { list-style: none; padding: 0; }
  .result-actions li {
    padding: 4px 0;
    font-size: 14px;
    color: var(--text-muted);
  }
  .result-actions li::before { content: "- "; }
  .result-transcript {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #ffffff15;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
    width: 100%;
  }
  .btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid #ffffff20; }
  .btn-connect {
    padding: 8px 16px;
    font-size: 13px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid #ffffff20;
    border-radius: 8px;
    cursor: pointer;
  }
  .btn-success { background: var(--green); color: #fff; }

  /* Error */
  .error-msg {
    background: #e74c3c22;
    border: 1px solid var(--red);
    border-radius: 10px;
    padding: 16px;
    font-size: 14px;
    text-align: center;
  }

  footer {
    text-align: center;
    padding: 10px;
    font-size: 11px;
    color: var(--text-muted);
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>STAT</h1>
    <div class="subtitle">檢傷標籤語音列印系統</div>
  </header>

  <div class="status-bar">
    <div class="printer-status">
      <span class="dot" id="printerDot"></span>
      <span id="printerLabel">印表機未連線</span>
      <button class="btn-connect" id="btnConnect" onclick="connectPrinter()">連線</button>
    </div>
    <div class="case-count">已處理：<span id="caseCount">0</span> 人</div>
  </div>

  <div class="main-area">
    <!-- Idle Screen -->
    <div class="screen active" id="screenIdle">
      <button class="record-btn" id="btnRecord">
        <span class="mic">&#x1F399;</span>
        <span>按住錄音</span>
      </button>
      <div class="recording-info" style="visibility:hidden" id="idleHint">按住按鈕開始口述傷況</div>
    </div>

    <!-- Recording Screen -->
    <div class="screen" id="screenRecording">
      <button class="record-btn recording" id="btnRecording">
        <span class="mic">&#x1F399;</span>
        <span>放開停止</span>
      </button>
      <div class="recording-info">
        <span class="recording-dot"></span>錄音中... <span id="recordTime">0</span> 秒
      </div>
      <div class="recording-info">最長 20 秒自動停止</div>
    </div>

    <!-- Processing Screen -->
    <div class="screen" id="screenProcessing">
      <div class="spinner"></div>
      <div style="font-size:16px; margin-top:8px;">語音辨識與判讀中...</div>
    </div>

    <!-- Result Screen -->
    <div class="screen" id="screenResult">
      <div class="result-card" id="resultCard">
        <div class="result-level" id="resultLevel"></div>
        <div class="result-meta" id="resultMeta"></div>
        <div class="result-summary" id="resultSummary"></div>
        <ul class="result-actions" id="resultActions"></ul>
        <div class="result-transcript" id="resultTranscript"></div>
      </div>
      <div class="btn-row" id="resultButtons"></div>
    </div>

    <!-- Done Screen -->
    <div class="screen" id="screenDone">
      <div style="font-size:48px;">&#x2705;</div>
      <div style="font-size:18px;">列印完成</div>
      <button class="btn btn-primary" onclick="resetToIdle()" style="margin-top:12px;">下一位傷患</button>
    </div>

    <!-- Error Screen -->
    <div class="screen" id="screenError">
      <div class="error-msg" id="errorMsg"></div>
      <button class="btn btn-secondary" onclick="resetToIdle()" style="margin-top:12px;">返回重試</button>
    </div>
  </div>

  <footer>STAT v0.1 POC — 僅供演練展示</footer>
</div>

<script>
// ── Config ──
const API_BASE = window.location.origin;
const MAX_RECORD_SEC = 20;
const MIN_RECORD_SEC = 2;

// ── BLE Printer (H22) ──
// Common 58mm BLE printer UUIDs — update after real-device testing
const PRINTER_SERVICE_UUID = '000018f0-0000-1000-8000-00805f9b34fb';
const PRINTER_CHAR_UUID = '00002af1-0000-1000-8000-00805f9b34fb';

let bleDevice = null;
let bleCharacteristic = null;
let printerConnected = false;

// ── State ──
let mediaRecorder = null;
let audioChunks = [];
let recordTimer = null;
let recordSeconds = 0;
let caseCount = 0;
let currentResult = null;

// ── Triage display mapping ──
const LEVEL_MAP = {
  red:     { emoji: '🔴', label: '立即處置 - IMMEDIATE', color: 'red' },
  yellow:  { emoji: '🟡', label: '延遲處置 - DELAYED',   color: 'yellow' },
  green:   { emoji: '🟢', label: '輕傷 - MINOR',        color: 'green' },
  black:   { emoji: '⚫', label: '期待 - EXPECTANT',     color: 'black' },
  unknown: { emoji: '⚠️', label: '無法判讀',             color: 'unknown' },
};

// ── Screen management ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function resetToIdle() {
  currentResult = null;
  showScreen('screenIdle');
}

// ── Recording ──
const btnRecord = document.getElementById('btnRecord');
const btnRecording = document.getElementById('btnRecording');

function startRecording() {
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    audioChunks = [];
    recordSeconds = 0;
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });

    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      clearInterval(recordTimer);
      handleRecordingDone();
    };

    mediaRecorder.start();
    showScreen('screenRecording');

    document.getElementById('recordTime').textContent = '0';
    recordTimer = setInterval(() => {
      recordSeconds++;
      document.getElementById('recordTime').textContent = recordSeconds;
      if (recordSeconds >= MAX_RECORD_SEC) stopRecording();
    }, 1000);
  }).catch(err => {
    showError('無法存取麥克風：' + err.message);
  });
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
}

function handleRecordingDone() {
  if (recordSeconds < MIN_RECORD_SEC) {
    showError('口述時間不足，請錄製至少 2 秒');
    return;
  }
  const blob = new Blob(audioChunks, { type: 'audio/webm' });
  uploadAudio(blob);
}

// Touch / pointer events for push-to-talk
function addPTTEvents(btn, start, stop) {
  btn.addEventListener('pointerdown', e => { e.preventDefault(); start(); });
  btn.addEventListener('pointerup', e => { e.preventDefault(); stop(); });
  btn.addEventListener('pointerleave', e => { e.preventDefault(); stop(); });
  btn.addEventListener('contextmenu', e => e.preventDefault());
}
addPTTEvents(btnRecord, startRecording, () => {});
addPTTEvents(btnRecording, () => {}, stopRecording);

// ── API call ──
async function uploadAudio(blob) {
  showScreen('screenProcessing');
  const form = new FormData();
  form.append('audio_file', blob, 'recording.webm');

  try {
    const resp = await fetch(`${API_BASE}/transcribe-and-triage`, { method: 'POST', body: form });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ detail: { message: '伺服器錯誤' } }));
      const msg = err.detail?.message || err.detail || '伺服器錯誤';
      const transcript = err.detail?.transcript;
      showError(msg + (transcript ? `\n\n原始轉錄：${transcript}` : ''));
      return;
    }
    const data = await resp.json();
    currentResult = data;
    showResult(data);
  } catch (e) {
    showError('網路連線失敗：' + e.message);
  }
}

// ── Show result ──
function showResult(data) {
  const info = LEVEL_MAP[data.triage_level] || LEVEL_MAP.unknown;
  const card = document.getElementById('resultCard');
  card.className = 'result-card ' + info.color;

  document.getElementById('resultLevel').textContent = `${info.emoji} ${info.label}`;

  const ts = new Date(data.timestamp);
  const timeStr = `${ts.getFullYear()}/${String(ts.getMonth()+1).padStart(2,'0')}/${String(ts.getDate()).padStart(2,'0')} ${String(ts.getHours()).padStart(2,'0')}:${String(ts.getMinutes()).padStart(2,'0')}`;
  document.getElementById('resultMeta').textContent = `#${data.case_id}  ${timeStr}`;

  document.getElementById('resultSummary').textContent = data.summary;

  const actList = document.getElementById('resultActions');
  actList.innerHTML = '';
  (data.actions || []).forEach(a => {
    const li = document.createElement('li');
    li.textContent = a;
    actList.appendChild(li);
  });

  document.getElementById('resultTranscript').textContent = `語音原文：${data.transcript}`;

  // Buttons
  const btnRow = document.getElementById('resultButtons');
  btnRow.innerHTML = '';
  if (data.triage_level !== 'unknown') {
    const printBtn = document.createElement('button');
    printBtn.className = 'btn btn-primary';
    printBtn.textContent = '✅ 確認列印';
    printBtn.onclick = () => printLabel(data);
    btnRow.appendChild(printBtn);
  }
  const retryBtn = document.createElement('button');
  retryBtn.className = 'btn btn-secondary';
  retryBtn.textContent = '🔄 重新錄音';
  retryBtn.onclick = resetToIdle;
  btnRow.appendChild(retryBtn);

  caseCount++;
  document.getElementById('caseCount').textContent = caseCount;
  showScreen('screenResult');
}

function showError(msg) {
  document.getElementById('errorMsg').textContent = msg;
  showScreen('screenError');
}

// ── Bluetooth printer ──
async function connectPrinter() {
  if (!navigator.bluetooth) {
    alert('此瀏覽器不支援 Web Bluetooth，請使用 Android Chrome');
    return;
  }
  try {
    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [{ services: [PRINTER_SERVICE_UUID] }],
      optionalServices: [PRINTER_SERVICE_UUID],
    });

    bleDevice.addEventListener('gattserverdisconnected', () => {
      printerConnected = false;
      updatePrinterUI();
    });

    const server = await bleDevice.gatt.connect();
    const service = await server.getPrimaryService(PRINTER_SERVICE_UUID);
    bleCharacteristic = await service.getCharacteristic(PRINTER_CHAR_UUID);

    printerConnected = true;
    updatePrinterUI();
  } catch (e) {
    console.error('BLE connect error:', e);
    // If service UUID filter fails, try accepting all printers
    try {
      bleDevice = await navigator.bluetooth.requestDevice({
        acceptAllDevices: true,
        optionalServices: [PRINTER_SERVICE_UUID],
      });
      const server = await bleDevice.gatt.connect();
      const service = await server.getPrimaryService(PRINTER_SERVICE_UUID);
      bleCharacteristic = await service.getCharacteristic(PRINTER_CHAR_UUID);
      printerConnected = true;
      updatePrinterUI();
    } catch (e2) {
      alert('印表機連線失敗：' + e2.message);
    }
  }
}

function updatePrinterUI() {
  const dot = document.getElementById('printerDot');
  const label = document.getElementById('printerLabel');
  if (printerConnected) {
    dot.classList.add('connected');
    label.textContent = '已連線';
  } else {
    dot.classList.remove('connected');
    label.textContent = '印表機未連線';
  }
}

// ── ESC/POS print ──
async function printLabel(data) {
  if (!printerConnected || !bleCharacteristic) {
    alert('請先連線印表機');
    return;
  }

  const info = LEVEL_MAP[data.triage_level] || LEVEL_MAP.unknown;
  const ts = new Date(data.timestamp);
  const timeStr = `${ts.getFullYear()}/${String(ts.getMonth()+1).padStart(2,'0')}/${String(ts.getDate()).padStart(2,'0')} ${String(ts.getHours()).padStart(2,'0')}:${String(ts.getMinutes()).padStart(2,'0')}`;

  // Build ESC/POS commands
  const encoder = new TextEncoder();
  const cmds = [];

  // Initialize printer
  cmds.push(new Uint8Array([0x1B, 0x40]));
  // Set Chinese mode (codepage)
  cmds.push(new Uint8Array([0x1C, 0x26])); // FS & — select Chinese mode

  // === Header separator ===
  cmds.push(encoder.encode('================================\n'));

  // Bold + double height for level
  cmds.push(new Uint8Array([0x1B, 0x45, 0x01])); // bold on
  cmds.push(new Uint8Array([0x1D, 0x21, 0x01])); // double height
  cmds.push(encoder.encode(`${info.emoji} ${data.triage_label}\n`));
  cmds.push(new Uint8Array([0x1D, 0x21, 0x00])); // normal size
  cmds.push(new Uint8Array([0x1B, 0x45, 0x00])); // bold off

  cmds.push(encoder.encode('================================\n'));
  cmds.push(encoder.encode(`時間：${timeStr}\n`));
  cmds.push(encoder.encode(`編號：#${data.case_id}\n`));
  cmds.push(encoder.encode('--------------------------------\n'));
  cmds.push(encoder.encode('傷況摘要：\n'));
  cmds.push(encoder.encode(`${data.summary}\n\n`));
  cmds.push(encoder.encode('建議處置：\n'));
  (data.actions || []).forEach(a => {
    cmds.push(encoder.encode(`- ${a}\n`));
  });
  cmds.push(encoder.encode('================================\n'));

  // Feed and cut
  cmds.push(new Uint8Array([0x1B, 0x64, 0x04])); // feed 4 lines

  // Send all commands in chunks (BLE MTU is typically 20 bytes)
  const fullData = concatUint8Arrays(cmds);
  const CHUNK_SIZE = 20;

  try {
    for (let i = 0; i < fullData.length; i += CHUNK_SIZE) {
      const chunk = fullData.slice(i, i + CHUNK_SIZE);
      await bleCharacteristic.writeValueWithoutResponse(chunk);
      // Small delay between chunks for printer buffer
      await sleep(50);
    }
    showScreen('screenDone');
  } catch (e) {
    console.error('Print error:', e);
    printerConnected = false;
    updatePrinterUI();
    alert('列印失敗，印表機可能已斷線：' + e.message);
  }
}

function concatUint8Arrays(arrays) {
  let totalLen = 0;
  arrays.forEach(a => totalLen += a.length);
  const result = new Uint8Array(totalLen);
  let offset = 0;
  arrays.forEach(a => { result.set(a, offset); offset += a.length; });
  return result;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
