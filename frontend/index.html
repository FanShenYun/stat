<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>STAT - 檢傷標籤語音列印</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --text: #e0e0e0;
    --text-muted: #888;
    --red: #e74c3c;
    --yellow: #f1c40f;
    --green: #2ecc71;
    --black-tag: #2c2c2c;
    --gray: #7f8c8d;
    --accent: #3498db;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-user-select: none;
    user-select: none;
  }
  .container {
    width: 100%;
    max-width: 420px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }
  header {
    text-align: center;
    padding: 12px 0;
  }
  header h1 { font-size: 20px; letter-spacing: 2px; }
  header .subtitle { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  .status-bar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 10px 14px;
    background: var(--surface);
    border-radius: 10px;
    margin: 10px 0;
    font-size: 14px;
  }
  .status-bar .case-count { color: var(--text-muted); }

  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 16px;
  }

  /* Screens */
  .screen { display: none; width: 100%; text-align: center; }
  .screen.active { display: flex; flex-direction: column; align-items: center; gap: 16px; }

  /* Record button */
  .record-btn {
    width: 140px; height: 140px;
    border-radius: 50%;
    border: 4px solid var(--accent);
    background: transparent;
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  .record-btn .mic { font-size: 40px; }
  .record-btn:active, .record-btn.recording {
    background: rgba(231, 76, 60, 0.2);
    border-color: var(--red);
    transform: scale(1.05);
  }

  /* Recording indicator */
  .recording-info { font-size: 14px; color: var(--text-muted); }
  .recording-dot {
    display: inline-block;
    width: 12px; height: 12px;
    background: var(--red);
    border-radius: 50%;
    animation: pulse 1s infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Processing */
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid var(--surface);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Result card */
  .result-card {
    width: 100%;
    border-radius: 12px;
    padding: 20px;
    text-align: left;
  }
  .result-card.red { background: linear-gradient(135deg, #c0392b22, #e74c3c33); border: 2px solid var(--red); }
  .result-card.yellow { background: linear-gradient(135deg, #f39c1222, #f1c40f33); border: 2px solid var(--yellow); }
  .result-card.green { background: linear-gradient(135deg, #27ae6022, #2ecc7133); border: 2px solid var(--green); }
  .result-card.black { background: linear-gradient(135deg, #1a1a1a44, #2c2c2c66); border: 2px solid #555; }
  .result-card.unknown { background: linear-gradient(135deg, #7f8c8d22, #95a5a633); border: 2px solid var(--gray); }

  .result-level {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 8px;
  }
  .result-card.red .result-level { color: var(--red); }
  .result-card.yellow .result-level { color: var(--yellow); }
  .result-card.green .result-level { color: var(--green); }
  .result-card.black .result-level { color: #aaa; }
  .result-card.unknown .result-level { color: var(--gray); }

  .result-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
  .result-summary { font-size: 15px; line-height: 1.5; margin-bottom: 12px; }
  .result-actions { list-style: none; padding: 0; }
  .result-actions li {
    padding: 4px 0;
    font-size: 14px;
    color: var(--text-muted);
  }
  .result-actions li::before { content: "- "; }
  .result-transcript {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #ffffff15;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
    width: 100%;
  }
  .btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid #ffffff20; }

  /* Report hint card */
  .report-hint {
    width: 100%;
    background: var(--surface);
    border: 1px solid #ffffff15;
    border-radius: 10px;
    padding: 14px;
    text-align: left;
    font-size: 13px;
    line-height: 1.6;
  }
  .report-hint .hint-title {
    font-size: 14px;
    font-weight: bold;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .report-hint .hint-section {
    margin-bottom: 6px;
  }
  .report-hint .hint-label {
    font-weight: bold;
    color: var(--text);
  }
  .report-hint .hint-detail {
    color: var(--text-muted);
  }
  .hint-toggle {
    background: none;
    border: 1px solid #ffffff20;
    border-radius: 8px;
    color: var(--accent);
    font-size: 13px;
    padding: 6px 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* MARCH / MIST result sections */
  .result-section {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid #ffffff15;
  }
  .result-section-title {
    font-size: 13px;
    font-weight: bold;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .result-field {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-muted);
  }
  .result-field .field-label {
    color: var(--text);
    font-weight: bold;
  }
  .result-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }
  .result-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    background: #ffffff15;
    color: var(--text);
  }

  /* Error */
  .error-msg {
    background: #e74c3c22;
    border: 1px solid var(--red);
    border-radius: 10px;
    padding: 16px;
    font-size: 14px;
    text-align: center;
  }

  footer {
    text-align: center;
    padding: 10px;
    font-size: 11px;
    color: var(--text-muted);
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>STAT</h1>
    <div class="subtitle">檢傷標籤語音列印系統</div>
  </header>

  <div class="status-bar">
    <div class="case-count">已處理：<span id="caseCount">0</span> 人</div>
  </div>

  <div class="main-area">
    <!-- Idle Screen -->
    <div class="screen active" id="screenIdle">
      <button class="record-btn" id="btnRecord">
        <span class="mic">&#x1F399;</span>
        <span>按住錄音</span>
      </button>
      <button class="hint-toggle" id="btnHintToggle" onclick="toggleHint()">口述提示 MIST</button>
      <div class="report-hint" id="reportHint" style="display:none;">
        <div class="hint-title">MIST 口述回報格式</div>
        <div class="hint-section">
          <span class="hint-label">M 受傷機轉：</span>
          <span class="hint-detail">爆炸/槍傷/穿刺/車禍/墜落/咬傷/溺水...</span>
        </div>
        <div class="hint-section">
          <span class="hint-label">I 發現傷勢：</span>
          <span class="hint-detail">部位、傷型、出血、骨折、燒燙傷...</span>
        </div>
        <div class="hint-section">
          <span class="hint-label">S 生命徵象：</span>
          <span class="hint-detail">意識(AVPU)、呼吸次數、脈搏、血氧、體溫</span>
        </div>
        <div class="hint-section">
          <span class="hint-label">T 已做處置：</span>
          <span class="hint-detail">止血帶、填塞、加壓、胸封、保暖毯...</span>
        </div>
        <div style="margin-top:8px; border-top:1px solid #ffffff15; padding-top:8px;">
          <div class="hint-title">MARCH 評估順序</div>
          <span class="hint-detail">M大出血 → A呼吸道 → R呼吸 → C循環 → H低體溫</span>
        </div>
        <div style="margin-top:6px;">
          <span class="hint-detail" style="font-size:12px;">特殊族群請提及：兒童/孕婦/慢性病/高齡/外國人</span>
        </div>
      </div>
    </div>

    <!-- Recording Screen -->
    <div class="screen" id="screenRecording">
      <button class="record-btn recording" id="btnRecording">
        <span class="mic">&#x1F399;</span>
        <span>放開停止</span>
      </button>
      <div class="recording-info">
        <span class="recording-dot"></span>錄音中... <span id="recordTime">0</span> 秒
      </div>
      <div class="recording-info">最長 20 秒自動停止</div>
    </div>

    <!-- Processing Screen -->
    <div class="screen" id="screenProcessing">
      <div class="spinner"></div>
      <div style="font-size:16px; margin-top:8px;">語音辨識與判讀中...</div>
    </div>

    <!-- Result Screen -->
    <div class="screen" id="screenResult">
      <div class="result-card" id="resultCard">
        <div class="result-level" id="resultLevel"></div>
        <div class="result-meta" id="resultMeta"></div>
        <div class="result-summary" id="resultSummary"></div>
        <ul class="result-actions" id="resultActions"></ul>
        <div class="result-section" id="sectionMIST"></div>
        <div class="result-section" id="sectionMARCH"></div>
        <div class="result-section" id="sectionVitals"></div>
        <div class="result-section" id="sectionTags"></div>
        <div class="result-transcript" id="resultTranscript"></div>
      </div>
      <div class="btn-row" id="resultButtons"></div>
    </div>

    <!-- Done Screen -->
    <div class="screen" id="screenDone">
      <div style="font-size:48px;">&#x2705;</div>
      <div style="font-size:18px;">已完成</div>
      <button class="btn btn-primary" onclick="resetToIdle()" style="margin-top:12px;">下一位傷患</button>
    </div>

    <!-- Error Screen -->
    <div class="screen" id="screenError">
      <div class="error-msg" id="errorMsg"></div>
      <button class="btn btn-secondary" onclick="resetToIdle()" style="margin-top:12px;">返回重試</button>
    </div>
  </div>

  <footer>STAT v0.2 POC — 僅供演練展示</footer>
</div>

<script>
// ── Config ──
// Derive API base from current page path (includes /s/{secret}/)
const pagePath = window.location.pathname.replace(/\/+$/, '');
const API_BASE = window.location.origin + pagePath;
const MAX_RECORD_SEC = 20;
const MIN_RECORD_SEC = 2;

// ── State ──
let mediaRecorder = null;
let audioChunks = [];
let recordTimer = null;
let recordSeconds = 0;
let caseCount = 0;
let currentResult = null;

// ── Triage display mapping ──
const LEVEL_MAP = {
  red:     { emoji: '\u{1F534}', label: '緊急 - IMMEDIATE', color: 'red' },
  yellow:  { emoji: '\u{1F7E1}', label: '優先 - DELAYED',   color: 'yellow' },
  green:   { emoji: '\u{1F7E2}', label: '一般 - MINOR',        color: 'green' },
  black:   { emoji: '\u26AB',    label: '期待 - EXPECTANT',     color: 'black' },
  unknown: { emoji: '\u26A0\uFE0F', label: '無法判讀',          color: 'unknown' },
};

// ── Screen management ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function resetToIdle() {
  currentResult = null;
  showScreen('screenIdle');
}

// ── Recording ──
const btnRecord = document.getElementById('btnRecord');
const btnRecording = document.getElementById('btnRecording');

function startRecording() {
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    audioChunks = [];
    recordSeconds = 0;
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });

    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      clearInterval(recordTimer);
      handleRecordingDone();
    };

    mediaRecorder.start();
    showScreen('screenRecording');

    document.getElementById('recordTime').textContent = '0';
    recordTimer = setInterval(() => {
      recordSeconds++;
      document.getElementById('recordTime').textContent = recordSeconds;
      if (recordSeconds >= MAX_RECORD_SEC) stopRecording();
    }, 1000);
  }).catch(err => {
    showError('無法存取麥克風：' + err.message);
  });
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
}

function handleRecordingDone() {
  if (recordSeconds < MIN_RECORD_SEC) {
    showError('口述時間不足，請錄製至少 2 秒');
    return;
  }
  const blob = new Blob(audioChunks, { type: 'audio/webm' });
  uploadAudio(blob);
}

// Touch / pointer events for push-to-talk
function addPTTEvents(btn, start, stop) {
  btn.addEventListener('pointerdown', e => { e.preventDefault(); start(); });
  btn.addEventListener('pointerup', e => { e.preventDefault(); stop(); });
  btn.addEventListener('pointerleave', e => { e.preventDefault(); stop(); });
  btn.addEventListener('contextmenu', e => e.preventDefault());
}
addPTTEvents(btnRecord, startRecording, () => {});
addPTTEvents(btnRecording, () => {}, stopRecording);

// ── API call ──
async function uploadAudio(blob) {
  showScreen('screenProcessing');
  const form = new FormData();
  form.append('audio_file', blob, 'recording.webm');

  try {
    const resp = await fetch(`${API_BASE}/transcribe-and-triage`, { method: 'POST', body: form });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ detail: { message: '伺服器錯誤' } }));
      const msg = err.detail?.message || err.detail || '伺服器錯誤';
      const transcript = err.detail?.transcript;
      showError(msg + (transcript ? `\n\n原始轉錄：${transcript}` : ''));
      return;
    }
    const data = await resp.json();
    currentResult = data;
    showResult(data);
  } catch (e) {
    showError('網路連線失敗：' + e.message);
  }
}

// ── Helpers ──
function renderField(label, value) {
  if (!value) return '';
  return `<div class="result-field"><span class="field-label">${label}：</span>${value}</div>`;
}

// ── Show result ──
function showResult(data) {
  const info = LEVEL_MAP[data.triage_level] || LEVEL_MAP.unknown;
  const card = document.getElementById('resultCard');
  card.className = 'result-card ' + info.color;

  document.getElementById('resultLevel').textContent = `${info.emoji} ${info.label}`;

  const ts = new Date(data.timestamp);
  const timeStr = `${ts.getFullYear()}/${String(ts.getMonth()+1).padStart(2,'0')}/${String(ts.getDate()).padStart(2,'0')} ${String(ts.getHours()).padStart(2,'0')}:${String(ts.getMinutes()).padStart(2,'0')}`;
  document.getElementById('resultMeta').textContent = `#${data.case_id}  ${timeStr}`;

  document.getElementById('resultSummary').textContent = data.summary;

  const actList = document.getElementById('resultActions');
  actList.innerHTML = '';
  (data.actions || []).forEach(a => {
    const li = document.createElement('li');
    li.textContent = a;
    actList.appendChild(li);
  });

  // MIST section
  const mistEl = document.getElementById('sectionMIST');
  if (data.mist) {
    const m = data.mist;
    mistEl.innerHTML = `<div class="result-section-title">MIST 回報</div>` +
      renderField('M 機轉', m.m_mechanism) +
      renderField('I 傷勢', m.i_injuries) +
      renderField('S 徵象', m.s_signs) +
      renderField('T 處置', m.t_treatment);
    mistEl.style.display = '';
  } else { mistEl.style.display = 'none'; }

  // MARCH section
  const marchEl = document.getElementById('sectionMARCH');
  if (data.march) {
    const mc = data.march;
    const fields = [
      ['M 大出血', mc.m_hemorrhage],
      ['A 呼吸道', mc.a_airway],
      ['R 呼吸', mc.r_respiration],
      ['C 循環', mc.c_circulation],
      ['H 低體溫', mc.h_hypothermia],
    ].filter(f => f[1]);
    if (fields.length) {
      marchEl.innerHTML = `<div class="result-section-title">MARCH 評估</div>` +
        fields.map(f => renderField(f[0], f[1])).join('');
      marchEl.style.display = '';
    } else { marchEl.style.display = 'none'; }
  } else { marchEl.style.display = 'none'; }

  // Vitals section
  const vitalsEl = document.getElementById('sectionVitals');
  if (data.vitals) {
    const v = data.vitals;
    const vFields = [
      ['意識', v.consciousness],
      ['GCS', v.gcs],
      ['HR', v.hr],
      ['BP', v.bp],
      ['SpO2', v.spo2],
      ['Temp', v.temp],
      ['RR', v.rr],
    ].filter(f => f[1] != null);
    if (vFields.length) {
      vitalsEl.innerHTML = `<div class="result-section-title">生命徵象</div>` +
        vFields.map(f => renderField(f[0], f[1])).join('');
      vitalsEl.style.display = '';
    } else { vitalsEl.style.display = 'none'; }
  } else { vitalsEl.style.display = 'none'; }

  // Tags section (trauma codes, mechanism, special population)
  const tagsEl = document.getElementById('sectionTags');
  const TRAUMA_MAP = {A:'開放性顱骨骨折',B:'顱底骨折',C:'顏面/呼吸道灼傷',D:'張力性氣胸',E:'氣胸/氣血胸',F:'開放性氣胸',G:'腹腔內出血',H:'大血管損傷',I:'雙側股骨骨折',J:'脫皮性損傷',K:'壓砸傷症候群',L:'骨盆骨折',M:'內臟外露',N:'燒燙傷',O:'OHCA',P:'斷肢'};
  const MECH_MAP = {1:'爆炸',2:'槍傷',3:'銳物穿刺',4:'交通意外',5:'墜落',6:'化生放核毒',7:'生物襲咬',8:'氣壓傷',9:'高體溫/熱傷害',10:'低體溫/失溫',11:'溺水',12:'電擊傷'};
  let tagHtml = '';
  const tc = data.trauma_codes || [];
  const mc2 = data.mechanism_codes || [];
  const sp = data.special_population || [];
  if (tc.length || mc2.length || sp.length) {
    tagHtml = '<div class="result-section-title">分類標記</div><div class="result-tags">';
    tc.forEach(c => { tagHtml += `<span class="result-tag">${c} ${TRAUMA_MAP[c]||c}</span>`; });
    mc2.forEach(c => { tagHtml += `<span class="result-tag">${c} ${MECH_MAP[c]||c}</span>`; });
    sp.forEach(s => { tagHtml += `<span class="result-tag">${s}</span>`; });
    tagHtml += '</div>';
    tagsEl.innerHTML = tagHtml;
    tagsEl.style.display = '';
  } else { tagsEl.style.display = 'none'; }

  document.getElementById('resultTranscript').textContent = `語音原文：${data.transcript}`;

  // Buttons — Phase 1: confirm (no print) or retry
  const btnRow = document.getElementById('resultButtons');
  btnRow.innerHTML = '';
  if (data.triage_level !== 'unknown') {
    const confirmBtn = document.createElement('button');
    confirmBtn.className = 'btn btn-primary';
    confirmBtn.textContent = '確認';
    confirmBtn.onclick = () => showScreen('screenDone');
    btnRow.appendChild(confirmBtn);
  }
  const retryBtn = document.createElement('button');
  retryBtn.className = 'btn btn-secondary';
  retryBtn.textContent = '重新錄音';
  retryBtn.onclick = resetToIdle;
  btnRow.appendChild(retryBtn);

  caseCount++;
  document.getElementById('caseCount').textContent = caseCount;
  showScreen('screenResult');
}

// ── Hint toggle ──
function toggleHint() {
  const hint = document.getElementById('reportHint');
  const btn = document.getElementById('btnHintToggle');
  if (hint.style.display === 'none') {
    hint.style.display = 'block';
    btn.textContent = '收起提示';
  } else {
    hint.style.display = 'none';
    btn.textContent = '口述提示 MIST';
  }
}

function showError(msg) {
  document.getElementById('errorMsg').textContent = msg;
  showScreen('screenError');
}
</script>
</body>
</html>
